[pytest]
# --- Configurações de Descoberta ---
# Garante que o pytest procure testes apenas na pasta correta
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# --- Opções Padrão (Execução) ---
# -v: Verbose
# --tb=short: Traceback simplificado
# --cov: Gera relatório de cobertura para as pastas de lógica
# --cov-report: Exibe os arquivos que faltam testar no terminal e gera HTML
addopts =
    -v
    --tb=short
    --cov=services
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --strict-markers
    -p no:warnings

# --- Filtros de Diretório ---
# Impede que o pytest perca tempo vasculhando pastas desnecessárias
norecursedirs =
    .git
    .venv
    venv
    build
    dist
    htmlcov

# --- Marcadores (Markers) ---
# Permite rodar grupos específicos com 'pytest -m api', por exemplo
markers =
    unit: Testes unitários (lógica interna e helpers)
    integration: Testes de fluxo entre componentes
    api: Testes que simulam ou chamam APIs externas (Open-Meteo)
    ui: Testes de renderização da interface Streamlit
    slow: Testes que demoram mais de 1s para executar

# --- Configurações de Log ---
log_cli = true
log_cli_level = ERROR
log_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(linfo)s)
log_date_format = %Y-%m-%d %H:%M:%S
